services:
  - type: web
    name: medical-awareness-ai
    env: python
    plan: free

    buildCommand: pip install -r requirements.txt

    startCommand: python app.py

    envVars:
      - key: GEMINI_API_KEY
        sync: false

      - key: SERPER_API_KEY
        sync: false

      - key: PORT
        value: 10000