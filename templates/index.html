<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Awareness AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="hero text-center py-5">
    <h1>🩺 Medical Awareness AI</h1>
    <p>AI-powered health assistant for disease awareness, prevention & education</p>
</div>

<div class="container">

    <div class="glass-card p-4">

        <form action="/analyze" method="POST" id="medicalForm">

            <input
                type="text"
                name="topic"
                class="form-control form-control-lg mb-3"
                placeholder="Enter disease or medical topic (e.g. Diabetes)"
                required
            >

            <button type="submit" class="btn btn-primary btn-lg w-100">
                🚀 Generate Medical Report
            </button>
        </form>

        <div class="loader mt-4" id="loader" style="display:none;">
            <div class="spinner-border text-info"></div>
            <p>Analyzing medical data...</p>
        </div>

    </div>

    {% if result %}
    <div class="result-card mt-5">
        <div class="glass-card p-4">
            <h3>📋 Medical Awareness Report</h3>
            <pre style="white-space: pre-wrap;">{{ result }}</pre>
        </div>
    </div>
    {% endif %}

</div>

<script>
const form = document.getElementById("medicalForm");
const loader = document.getElementById("loader");

form.addEventListener("submit", function () {
    loader.style.display = "block";
});
</script>

</body>
</html>
